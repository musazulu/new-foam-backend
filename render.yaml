services:
  - type: web
    name: beddingzim-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py create_superuser_auto
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: beddingzim-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://beddingzim.vercel.app"
      - key: USE_S3
        value: "False"

databases:
  - name: beddingzim-db
    databaseName: beddingzim
    user: beddingzim
